<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Technical details, methodologies, and progress updates on materials synthesis and lamination projects in the Salguero Lab.">
  <title>Technical Projects | Salguero Research Group</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div id="header-container"></div>

  <main id="main-content">
    <h1>Technical Projects</h1>
    <p class="hero-tagline">Detailed chemical research and exploration projects in our laboratory.</p>

    <!-- Projects List Target -->
    <section class="mb-8">
      <div id="projects-list-target">
        <p>Loading projects database...</p>
      </div>
    </section>
  </main>

  <div id="footer-container"></div>

  <script type="module" src="src/js/layout.js"></script>
  <script type="module">
    import { loadData } from './src/js/loader.js';
    import { validateData } from './src/js/validator.js';
    import { ProjectCard } from './src/js/components.js';
    import { renderList } from './src/js/renderer.js';

    async function initProjects() {
      const dataObj = await loadData('projects.json');
      const projectsList = dataObj.projects || [];

      // Validate
      validateData('project', projectsList);

      // Render
      renderList({
        selector: '#projects-list-target',
        items: projectsList,
        componentFn: ProjectCard,
        emptyMessage: 'No projects registered in the database.'
      });
    }

    initProjects();
  </script>
</body>
</html>
